# Block page endpoint
server {
    listen 80;
    listen [::]:80;
    server_name ${ip_address};

    access_log /var/log/nginx/blocked.access;
    error_log /var/log/nginx/blocked.error error;

    root /var/capy/resources;
    index index.html;

    # Serve files from resources directory
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers for HTTP
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${ip_address};

    access_log /var/log/nginx/blocked-ssl.access;
    error_log /var/log/nginx/blocked-ssl.error error;

    ssl_certificate /etc/ssl/ip/fullchain.pem;
    ssl_certificate_key /etc/ssl/ip/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/capy/resources;
    index index.html;

    # Serve files from resources directory
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

