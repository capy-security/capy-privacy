# Fast API endpoint
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.${domain};

    access_log /var/log/nginx/api.access;
    error_log /var/log/nginx/api.error error;

    ssl_certificate /etc/ssl/api/fullchain.pem;
    ssl_certificate_key /etc/ssl/api/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;


    # Proxy all requests to the API
    location / {
       # Proxy HTTP/1.1, clear the connection header to enable Keep-Alive
       proxy_http_version 1.1;
       proxy_set_header Connection "";

       # Forward headers to preserve client information
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_set_header X-Forwarded-Host $host;
       proxy_set_header X-Forwarded-Port $server_port;

       # Timeouts
       proxy_connect_timeout 60s;
       proxy_send_timeout 60s;
       proxy_read_timeout 60s;

       # Proxy pass to API (listening on api:8080)
       proxy_pass http://capy_api:8080;
    }
}