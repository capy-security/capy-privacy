# DNS server - DNS over HTTPS (DOH)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dns.${domain};

    access_log /var/log/nginx/frontend.access;
    error_log /var/log/nginx/frontend.error error;

    ssl_certificate /etc/ssl/root/fullchain.pem;
    ssl_certificate_key /etc/ssl/root/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Root directory for static files
    root /var/capy/www;

    # Serve static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|json)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Serve frontend application (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}