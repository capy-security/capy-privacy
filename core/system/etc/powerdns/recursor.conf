recursor:
  include_dir: /etc/powerdns/recursor.d
  lua_dns_script: /etc/powerdns/lua.d/capy.lua
  security_poll_suffix: ''
incoming:
  listen:
    - 0.0.0.0
    - '::'
  allow_from_file: /etc/powerdns/recursor.d/allow_from.yml
outgoing:
  source_address:
    - 0.0.0.0
    - '::'
logging:
  disable_syslog: true
  # loglevel: 4
  # timestamp: true
  # quiet: false
  
  # Protobuf logging for incoming queries and responses
  # Sends structured DNS query/response data to a protobuf receiver
  # See: https://docs.powerdns.com/recursor/lua-config/protobuf.html
  protobuf_servers:
    - servers: ["127.0.0.1:6000"]    # Change port if your collector uses a different one
      logQueries: true               # Log incoming queries from clients
      logResponses: false            # Log responses sent to clients
      timeout: 2                     # Timeout in seconds when sending messages
      maxQueuedEntries: 100          # Max entries in memory if server unreachable
      reconnectWaitTime: 5           # Wait time between reconnection attempts
      asyncConnect: true             # Connect in separate thread (non-blocking)
      taggedOnly: false              # Send all messages, not just tagged ones
      exportTypes: ['A']             # Record types to export in responses

  # Optional: IP address masking for anonymization
  # protobuf_mask_v4: 32  # IPv4 mask (32 = no masking, 24 = mask last octet)
  # protobuf_mask_v6: 128 # IPv6 mask (128 = no masking, 48 = mask last 80 bits)

# 0=emergency, 1=alert, 2=critical, 3=error, 4=warning, 5=notice, 6=info, 7=debug
# https://doc.powerdns.com/recursor/yamlsettings.html#setting-yaml-logging-quiet