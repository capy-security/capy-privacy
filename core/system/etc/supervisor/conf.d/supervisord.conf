[supervisord]
loglevel=info
nodaemon=true
user=root


[program:metrics]
command=/usr/bin/listener --output-sqlite
# user=_dnsdist
autostart=true
autorestart=false
startretries=1
redirect_stderr=false
stdout_logfile=/var/log/supervisor/%(program_name)s_stdout.log
stdout_logfile_maxbytes=16MB
stderr_logfile=/var/log/supervisor/%(program_name)s_stderr.log
stderr_logfile_maxbytes=16MB
priority=10

[program:recursor]
command=/usr/sbin/pdns_recursor --daemon=no --write-pid=no --disable-syslog
# user=pdns
autostart=true
autorestart=false
startretries=1
redirect_stderr=false
stdout_logfile=/var/log/supervisor/%(program_name)s_stdout.log
stdout_logfile_maxbytes=16MB
stderr_logfile=/var/log/supervisor/%(program_name)s_stderr.log
stderr_logfile_maxbytes=16MB
priority=20

[program:dnsdist]
command=/usr/bin/dnsdist --supervised --disable-syslog --config /etc/dnsdist/dnsdist.conf
# user=_dnsdist
autostart=true
autorestart=false
startretries=1
redirect_stderr=false
stdout_logfile=/var/log/supervisor/%(program_name)s_stdout.log
stdout_logfile_maxbytes=16MB
stderr_logfile=/var/log/supervisor/%(program_name)s_stderr.log
stderr_logfile_maxbytes=16MB
priority=30

