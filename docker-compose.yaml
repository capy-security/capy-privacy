# Base domain (e.g. capysecurity.com). API/DNS/Admin are always api.$DOMAIN, dns.$DOMAIN, admin.$DOMAIN.
# Set DOMAIN (and optionally IP_ADDRESS) in .env.
services:
  capy_api:
    image: capy_api:latest
    restart: always
    environment:
      API_ENV: "production"
    volumes:
      - ./resources/database/:/var/capy/database/
    ports:
      - "127.0.0.1:8080:8080/tcp"
    expose:
      - "8080"
    build:
      context: ./api
      args:
        application: "api"
        domain: "api.${DOMAIN:-localhost}"
      tags:
        - test

  capy_core:
    image: capy_core:latest
    restart: always
    volumes:
      - ./resources/database/:/var/capy/database/
      - ./resources/ssl/:/etc/ssl/
    ports:
      - "53:53/udp"
      - "5300:5300/tcp"
      - "853:853/tcp"
    expose:
      - "53"
      - "853"
      - "5300"
    ulimits:
      nofile:
        soft: 16000
        hard: 16000
    build:
      context: ./core
      args:
        application: "core"
        domain: "dns.${DOMAIN:-localhost}"
      tags:
        - test

  capy_front:
    image: capy_front:latest
    restart: always
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_DOMAIN: api.${DOMAIN:-localhost}
      DNS_DOMAIN: dns.${DOMAIN:-localhost}
      ADMIN_DOMAIN: admin.${DOMAIN:-localhost}
      IP_ADDRESS: ${IP_ADDRESS:-127.0.0.1}
    volumes:
      - ./resources/ssl/:/etc/ssl/
      - ./resources/caddy:/etc/caddy/custom/:ro
      - ./resources/www/:/var/capy/website/
    ports:
      - '80:80/tcp'
      - '443:443/tcp'
    expose:
      - '80'
      - '443'
    build:
      context: .
      dockerfile: front/Dockerfile
      args:
        application: "admin"
        domain: "admin.${DOMAIN:-localhost}"
        ip_address: "${IP_ADDRESS:-127.0.0.1}"
        VITE_API_URL: "https://api.${DOMAIN:-localhost}/"
      tags:
        - test

volumes:
  capy_database:
    # networks:
    #   local:
    #     driver: bridge
